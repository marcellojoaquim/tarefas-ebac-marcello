server:
  port: 8081
spring:
  application:
    name: gateway-api
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: google
              uri: https://google.com
              predicates:
                - Path=/search**
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: unrestricted